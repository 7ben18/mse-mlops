base_run:
  model:
    model_name: models/pretrained/dinov3-vits16-pretrain-lvd1689m
  data:
    metadata_csv: data/processed/ham10000/metadata.csv
    images_dir: data/processed/ham10000/HAM10000_images
    label_column: mb
    train_set: train
    val_set: val
    train_fraction: 1.0
    val_fraction: 1.0
    train_samples: null
    val_samples: null
  training:
    output_dir: models/finetuned/dinov3_ham10000_tune
    epochs: 3
    batch_size: 8
    image_size: 224
    lr: 0.00005
    weight_decay: 0.01
    num_workers: 0
    seed: 42
    device: auto
    freeze_backbone: true
    gradient_accumulation_steps: 1
    warmup_ratio: 0.1
    lr_scheduler_type: linear
    max_grad_norm: 1.0
    max_train_batches: null
    max_val_batches: null
    resume_from_checkpoint: null
    save_total_limit: 3
  tracking:
    mlflow_tracking_uri: http://127.0.0.1:5001
    mlflow_experiment_name: mse-mlops-tuning
    mlflow_run_name: null
    mlflow_tags:
      project: mse-mlops
      workflow: ray-tune

search_space:
  training:
    lr:
      type: loguniform
      lower: 0.00001
      upper: 0.001
    batch_size:
      type: choice
      values: [8, 16]

tune:
  metric: val_roc_auc
  mode: max
  num_samples: 4
  search_alg: basic_variant
  scheduler: fifo
  max_concurrent_trials: 1
  resources:
    cpu: 1
    gpu: 0
  seed: 42
  ray_address: null

output:
  ray_results_dir: reports/ray_results
  best_config_path: reports/tuning/best_config.yaml
  leaderboard_path: reports/tuning/leaderboard.json

site_name: mse-mlops
repo_url: https://github.com/7ben18/mse-mlops
site_url: https://7ben18.github.io/mse-mlops
site_description: DINOv3 fine-tuning setup for melanoma skin cancer classification.
site_author: mse-mlops contributors
edit_uri: edit/main/docs/
repo_name: 7ben18/mse-mlops
copyright: Maintained by mse-mlops contributors.
exclude_docs: |
  README.md
  notebooks/ham10000/eda.ipynb

nav:
  - Home: index.md
  - Pipeline: pipeline.md
  - MLflow Tracking: mlflow-tracking.md
  - Serving: serving.md
  - Serving Architecture: serving-architecture.md
  - Modules: modules.md
  - Notebooks:
      - EDA: notebooks/melanoma_cancer_dataset/eda.ipynb
plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
theme:
  name: material
  feature:
    tabs: true
  features:
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/7ben18/mse-mlops

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

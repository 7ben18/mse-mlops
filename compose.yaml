services:
  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.Dockerfile
    image: mse-mlops-mlflow:latest
    pull_policy: never
    command:
      [
        "uv",
        "run",
        "--no-sync",
        "--frozen",
        "--no-dev",
        "mlflow",
        "server",
        "--backend-store-uri",
        "sqlite:////repo/mlflow.db",
        "--default-artifact-root",
        "file:///repo/mlartifacts",
        "--host",
        "0.0.0.0",
        "--port",
        "5001",
        "--allowed-hosts",
        "localhost:5001,127.0.0.1:5001,mlflow:5001",
      ]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/', timeout=5)"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5001:5001"
    volumes:
      - ./:/repo

  api:
    profiles: ["ui"]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: mse-mlops-api:latest
    pull_policy: never
    environment:
      FEEDBACK_DIR: /feedback
      HF_HOME: /app/.cache/huggingface
      MODEL_PATH: /app/models/finetuned/dinov3_ham10000/best_model.pt
      TRANSFORMERS_CACHE: /app/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - feedback_data:/feedback

  ui:
    profiles: ["ui"]
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    image: mse-mlops-ui:latest
    pull_policy: never
    depends_on:
      - api
    environment:
      API_URL: http://api:8000
      DOCTOR_PASSWORD: ${DOCTOR_PASSWORD:-doctor123}
    ports:
      - "7777:7777"

  train:
    profiles: ["train"]
    build:
      context: .
      dockerfile: docker/train.Dockerfile
    image: mse-mlops:latest
    pull_policy: never
    working_dir: /app
    depends_on:
      mlflow:
        condition: service_healthy
    command: ["uv", "run", "--no-sync", "--frozen", "--no-dev", "python", "scripts/train.py"]
    environment:
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./models:/app/models

  tune:
    profiles: ["train"]
    build:
      context: .
      dockerfile: docker/train.Dockerfile
    image: mse-mlops:latest
    pull_policy: never
    working_dir: /app
    depends_on:
      mlflow:
        condition: service_healthy
    command: ["uv", "run", "--no-sync", "--frozen", "--no-dev", "python", "scripts/tune.py"]
    environment:
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports

volumes:
  feedback_data:
